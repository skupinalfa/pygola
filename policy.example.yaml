# setup:
#   mode: confirm          # pause for human review before sending to Anthropic
#   trusted_provider:
#     kind: local          # PII analysis stays on-prem
#     model: llama3
#   commercial_provider:
#     kind: anthropic      # sanitised prompt goes to Claude
#     model: claude-sonnet-4-6
