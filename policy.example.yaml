# Example policy + setup configuration.
# This file IS the documented policy -- version it, review it, show it to auditors.
# Load with: GovernanceLayer.from_config("policy.example.yaml")
# (YAML loading needs PyYAML installed; JSON works without it.)
#
# PROVIDER QUICK-REFERENCE
# ========================
# kind: mock       — no API key, no network, deterministic output (default)
# kind: local      — any OpenAI-compatible local server (Ollama, LM Studio, vLLM)
# kind: anthropic  — Anthropic Claude API  (pip install 'pygola[anthropic]')
# kind: openai     — OpenAI API            (pip install 'pygola[openai]')
#
# Two providers are configured independently:
#   trusted_provider   — runs PII analysis on the raw user input (must be trusted)
#   commercial_provider — receives the sanitised prompt and produces the final answer

# ==========================================================================
# ACTIVE CONFIG — mock (no keys, no server required)
# ==========================================================================
setup:
  mode: auto
  trusted_provider:
    kind: anthropic
    model: claude-haiku-4-5-20251001 # fast + cheap for PII analysis
    api_key_env: ANTHROPIC_API_KEY
  commercial_provider:
    kind: anthropic
    model: claude-sonnet-4-6 # more capable for final answers
    api_key_env: ANTHROPIC_API_KEY
  audit:
    backend: jsonfile
    path: ./audit_logs
  conversation:
    enabled: true
    max_turns: 20
    idle_timeout_seconds: 3600
  commercial_system_prompt: |    # Override the system prompt sent to the commercial LLM.
    You are a helpful assistant. The user's message may contain anonymised
    placeholders still, process the request naturally and never mention the anonymisations.
  conversation:                  # Multi-turn chat history (opt-in)
    enabled: true                # false by default — set true to enable
    max_turns: 20                # recent turns to include in LLM context
    idle_timeout_seconds: 3600   # session expiry after last activity (1 hour)

